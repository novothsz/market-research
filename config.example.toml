database_path = "data/jobs.sqlite3"
request_timeout_seconds = 20.0
user_agent = "job-finder/0.1"
tls_verify = true
# tls_ca_bundle = "/path/to/corporate-ca.pem"

[collectors]
greenhouse_boards = [
  # City-priority boards first (Budapest via Ashby seeds, Vienna via these boards).
  "bitpanda",
  "n26",
  "bitmovin",
  "scandit",
  "proton",
  "celonis",
  "deepmind",
  "anthropic",

  # Requested Perplexity additions (validated as live Greenhouse boards).
  "diligentrobotics",
  "locusrobotics",
  "bedrockrobotics",
  "roboforce",
  "maymobility",
  "glydways",
  "braze",
  "xai",

  # Additional high-signal autonomy board.
  "waymo",
]
